<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hábitos · LifeOS</title>
<!-- Aplica tema antes de renderizar -->
<script>(function(){var t=localStorage.getItem('rd-theme')||'light';document.documentElement.setAttribute('data-theme',t);})()</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lifeos.css">
</head>
<body>

<div id="sb-overlay" class="sb-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <div id="sidebar" class="sidebar"></div>

  <div class="main-area">
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <div class="page-role"><i class="ti ti-checkbox" aria-hidden="true"></i> Rituais & Hábitos</div>
          <h1 class="page-title">Hábitos</h1>
          <p class="page-subtitle">Gerencie seus rituais e acompanhe a consistência dos últimos 14 dias</p>
        </div>
        <div class="save-status idle" id="save-status">
          <i class="ti ti-circle-dot" aria-hidden="true"></i> Pronto
        </div>
      </div>

      <!-- Grid -->
      <div class="lo-card" style="margin-bottom:1.2rem">
        <div class="lo-card-header">
          <i class="ti ti-chart-bar" aria-hidden="true"></i>
          <span class="lo-card-title">Consistência — últimos 14 dias</span>
          <span style="margin-left:auto;font-size:11px;color:var(--text-muted)" id="period-label"></span>
        </div>
        <div class="lo-card-body" style="padding:1rem 1.2rem">
          <div class="habit-grid-wrap">
            <div class="habit-grid" id="habit-grid">
              <div style="font-size:13px;color:var(--text-muted);grid-column:1/-1">Carregando...</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:0.8rem">
            <div style="width:12px;height:12px;border-radius:50%;background:var(--acc)"></div>
            <span style="font-size:11px;color:var(--text-muted)">Concluído</span>
            <div style="width:12px;height:12px;border-radius:50%;background:var(--border2);margin-left:8px"></div>
            <span style="font-size:11px;color:var(--text-muted)">Não concluído</span>
          </div>
        </div>
      </div>

      <!-- Lista -->
      <div class="lo-card">
        <div class="lo-card-header">
          <i class="ti ti-list" aria-hidden="true"></i>
          <span class="lo-card-title">Meus hábitos</span>
        </div>
        <div id="habitos-list">
          <div style="padding:1.2rem;font-size:13px;color:var(--text-muted)">Carregando...</div>
        </div>
        <!-- Formulário -->
        <div class="add-form">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:0.6rem">
            Adicionar hábito
          </div>
          <div class="add-form-grid">
            <div class="form-field">
              <label class="form-label">Nome</label>
              <input type="text" class="form-input" id="new-nome" placeholder="Ex: Leitura 20 min">
            </div>
            <div class="form-field">
              <label class="form-label">Ícone Tabler</label>
              <input type="text" class="form-input" id="new-icone" placeholder="ti-book" value="ti-check">
            </div>
            <div class="form-field">
              <label class="form-label">Reino</label>
              <select class="form-select" id="new-reino">
                <option value="saude">🌿 Saúde</option>
                <option value="carreira">💼 Carreira</option>
                <option value="financas">💰 Finanças</option>
                <option value="relacionamentos">❤️ Relacionamentos</option>
                <option value="aprendizado">📚 Aprendizado</option>
                <option value="legado">🌍 Legado</option>
              </select>
            </div>
            <button class="btn-primary" onclick="addHabito()">
              <i class="ti ti-plus" aria-hidden="true"></i> Adicionar
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="nav.js"></script>
<script>
let habitos = [];
let checks = {};

const REINO_LABELS = {
  saude:'🌿 Saúde', carreira:'💼 Carreira', financas:'💰 Finanças',
  relacionamentos:'❤️ Relacionamentos', aprendizado:'📚 Aprendizado', legado:'🌍 Legado'
};

// ── INIT — cache primeiro ─────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Mostra do cache imediatamente
  try {
    habitos = JSON.parse(localStorage.getItem('lo-habitos') || '[]');
    checks  = JSON.parse(localStorage.getItem('lo-checks-14d') || '{}');
  } catch(e) {}

  if (habitos.length) { renderGrid(); renderList(); }

  // Sincroniza em segundo plano
  initSupabase();
  syncHabitos();
});

async function syncHabitos() {
  if (!window.db) await new Promise(r => setTimeout(r, 1500));
  initSupabase();
  if (!window.db) return;

  try {
    const today = todayISO();
    const start = addDays(today, -13);

    const { data: hList } = await window.db.from('habitos').select('*').eq('ativo',true).order('ordem');
    if (hList) { habitos = hList; localStorage.setItem('lo-habitos', JSON.stringify(hList)); }

    const { data: hc } = await window.db.from('habito_checks')
      .select('*').gte('data',start).lte('data',today);
    checks = {};
    (hc||[]).forEach(c => checks[`${c.habito_id}:${c.data}`] = c.concluido);
    localStorage.setItem('lo-checks-14d', JSON.stringify(checks));

    renderGrid();
    renderList();
  } catch(e) { console.warn(e); }
}

function getDays14() {
  const today = todayISO();
  return Array.from({length:14},(_,i)=>addDays(today,-13+i));
}

function renderGrid() {
  const days = getDays14();
  const grid = document.getElementById('habit-grid');
  const period = document.getElementById('period-label');
  const fmt = d => new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  period.textContent = `${fmt(days[0])} → ${fmt(days[days.length-1])}`;

  if (!habitos.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;font-size:13px;color:var(--text-muted)">Adicione hábitos abaixo para ver o grid.</div>`;
    return;
  }

  let html = `<div></div>`;
  days.forEach(d => {
    const isT = isToday(d);
    html += `<div class="hg-header" style="${isT?'color:var(--acc)':''}">${shortDay(d)}<br>${new Date(d+'T12:00:00').getDate()}</div>`;
  });
  habitos.forEach(h => {
    html += `<div class="hg-name"><i class="ti ${h.icone}" style="color:${h.cor}" aria-hidden="true"></i>${h.nome}</div>`;
    days.forEach(d => {
      const done = checks[`${h.id}:${d}`];
      html += `<div class="hg-cell"><div class="hg-dot${done?' done':''}"></div></div>`;
    });
  });

  grid.style.gridTemplateColumns = `180px repeat(14,1fr)`;
  grid.innerHTML = html;
}

function renderList() {
  const list = document.getElementById('habitos-list');
  if (!habitos.length) {
    list.innerHTML = `<div style="padding:1.2rem;font-size:13px;color:var(--text-muted)">Nenhum hábito ainda. Use o formulário abaixo.</div>`;
    return;
  }
  const days14 = getDays14();
  list.innerHTML = habitos.map(h => {
    const doneCount = days14.filter(d=>checks[`${h.id}:${d}`]).length;
    const pct = Math.round((doneCount/14)*100);
    return `<div class="habit-manage-item">
      <div class="habit-color-dot" style="background:${h.cor}"></div>
      <i class="ti ${h.icone}" style="color:${h.cor};font-size:16px" aria-hidden="true"></i>
      <div class="habit-manage-name">${h.nome}</div>
      <span class="habit-manage-reino">${REINO_LABELS[h.reino]||h.reino}</span>
      <span style="font-size:11px;font-weight:700;color:${pct>=70?'var(--acc-text)':'var(--text-muted)'};min-width:36px;text-align:right">${pct}%</span>
      <div class="habit-manage-actions">
        <button class="habit-action-btn danger" onclick="removeHabito('${h.id}')" title="Desativar">
          <i class="ti ti-trash" aria-hidden="true"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

async function addHabito() {
  const nome = document.getElementById('new-nome').value.trim();
  const icone = document.getElementById('new-icone').value.trim() || 'ti-check';
  const reino = document.getElementById('new-reino').value;
  if (!nome) return;

  // Otimista: adiciona ao cache imediatamente
  const temp = { id:'temp-'+Date.now(), nome, icone, reino, cor:'#8a2540', ordem:habitos.length+1, ativo:true };
  habitos.push(temp);
  localStorage.setItem('lo-habitos', JSON.stringify(habitos));
  document.getElementById('new-nome').value = '';
  renderGrid(); renderList();

  if (!window.db) return;
  setStatus('saving');
  const { data } = await window.db.from('habitos')
    .insert({nome,icone,reino,cor:'#8a2540',ordem:habitos.length})
    .select().single();
  if (data) {
    habitos = habitos.map(h => h.id===temp.id ? data : h);
    localStorage.setItem('lo-habitos', JSON.stringify(habitos));
    renderGrid(); renderList();
  }
  setStatus('saved');
}

async function removeHabito(id) {
  if (!confirm('Desativar este hábito? O histórico será preservado.')) return;
  habitos = habitos.filter(h=>h.id!==id);
  localStorage.setItem('lo-habitos', JSON.stringify(habitos));
  renderGrid(); renderList();
  if (!window.db) return;
  await window.db.from('habitos').update({ativo:false}).eq('id',id);
}

function setStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  const m = {
    idle:   ['<i class="ti ti-circle-dot"></i> Pronto','idle'],
    saving: ['<i class="ti ti-loader"></i> Salvando…','saving'],
    saved:  ['<i class="ti ti-circle-check"></i> Salvo','saved'],
  };
  const [h,c]=m[s]||m.idle;
  el.innerHTML=h; el.className='save-status '+c;
  if(s==='saved') setTimeout(()=>setStatus('idle'),2000);
}
</script>
</body>
</html>
