<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Valores · LifeOS</title>
<script>(function(){
  var t=localStorage.getItem('rd-theme')||'light';
  var a=localStorage.getItem('lp-accent');
  document.documentElement.setAttribute('data-theme',t);
  if(a) document.documentElement.style.setProperty('--acc',a);
})()</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lifeos.css">
<style>
/* Declaração */
.declaracao-card{
  background:var(--acc-soft);border:1px solid var(--acc);border-radius:var(--radius);
  padding:1.4rem;margin-bottom:1.4rem;
}
.declaracao-header{display:flex;align-items:center;gap:10px;margin-bottom:.8rem;}
.declaracao-header i{font-size:22px;color:var(--acc-text);}
.declaracao-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--acc-text);}
.declaracao-text{font-size:14px;color:var(--text2);line-height:1.7;}
.declaracao-edit-btn{font-size:11px;color:var(--acc-text);background:none;border:none;
  cursor:pointer;font-family:inherit;margin-top:.8rem;padding:0;display:flex;align-items:center;gap:5px;}
.declaracao-textarea{width:100%;padding:.6rem .8rem;border:1px solid var(--acc);border-radius:8px;
  background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;resize:vertical;min-height:100px;box-sizing:border-box;line-height:1.7;margin-top:.5rem;}

/* Grid valores */
.valores-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;margin-bottom:1.4rem;}
@media(max-width:680px){.valores-grid{grid-template-columns:1fr;}}

.valor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.2rem;border-top:3px solid transparent;transition:box-shadow .15s;}
.valor-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}

.valor-header{display:flex;align-items:center;gap:10px;margin-bottom:.8rem;}
.valor-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.valor-icon i{font-size:17px;color:#fff;}
.valor-nome{font-size:15px;font-weight:700;color:var(--text);}

.valor-definicao{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:.8rem;}

.valor-filtro{font-size:13px;color:var(--text2);font-style:italic;
  border-left:3px solid var(--acc);padding-left:.7rem;margin-bottom:.8rem;line-height:1.5;}

.valor-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);margin-bottom:.3rem;}
.valor-dia{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:.7rem;}
.valor-ciencia{font-size:11px;color:var(--text-muted);font-style:italic;
  padding:.4rem .6rem;background:var(--surface2);border-radius:6px;line-height:1.5;}

.valor-edit-btn{margin-top:.8rem;font-size:11px;color:var(--text-muted);background:none;
  border:1px solid var(--border);padding:3px 10px;border-radius:20px;cursor:pointer;
  font-family:inherit;transition:border-color .15s,color .15s;}
.valor-edit-btn:hover{border-color:var(--acc);color:var(--acc-text);}

/* Verificação semanal */
.verificacao-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.4rem;}
.verificacao-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:.3rem;
  display:flex;align-items:center;gap:8px;}
.verificacao-sub{font-size:12px;color:var(--text-muted);margin-bottom:1.1rem;}
.verificacao-item{margin-bottom:1rem;}
.verificacao-item-header{display:flex;align-items:center;gap:8px;margin-bottom:.4rem;}
.verificacao-item-header i{font-size:14px;}
.verificacao-item-nome{font-size:13px;font-weight:600;color:var(--text2);}
.verificacao-textarea{width:100%;padding:.45rem .7rem;border:1px solid var(--border);border-radius:7px;
  background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;
  outline:none;resize:none;height:56px;box-sizing:border-box;line-height:1.5;}
.verificacao-textarea:focus{border-color:var(--acc);}

/* Modal edição de valor */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.mo-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;position:relative;}
.mo-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;
  border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mo-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:1.2rem;}
.fl{margin-bottom:.9rem;}
.fl label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);display:block;margin-bottom:.35rem;}
.fi{width:100%;padding:.45rem .7rem;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;box-sizing:border-box;}
.fi:focus{border-color:var(--acc);}
.fta{width:100%;padding:.45rem .7rem;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;resize:vertical;min-height:64px;box-sizing:border-box;}
.fta:focus{border-color:var(--acc);}
.mo-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem;
  padding-top:.9rem;border-top:1px solid var(--border);}
.btn-p{padding:.42rem 1.1rem;border-radius:8px;border:none;background:var(--acc);
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-s{padding:.42rem 1rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<div id="sb-overlay" class="sb-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <div id="sidebar" class="sidebar"></div>
  <div class="main-area">
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <div class="page-role"><i class="ti ti-filter" aria-hidden="true"></i> O filtro de todas as decisões</div>
          <h1 class="page-title">Valores</h1>
          <p class="page-subtitle">O que orienta cada escolha</p>
        </div>
        <div class="save-status idle" id="save-status">
          <i class="ti ti-circle-dot"></i> Pronto
        </div>
      </div>

      <!-- Declaração -->
      <div class="declaracao-card">
        <div class="declaracao-header">
          <i class="ti ti-user-heart" aria-hidden="true"></i>
          <span class="declaracao-title">Declaração do Médico Arquiteto</span>
        </div>
        <div class="declaracao-text" id="declaracao-text">Carregando...</div>
        <button class="declaracao-edit-btn" onclick="toggleDeclaracao()">
          <i class="ti ti-pencil" id="decl-edit-icon" aria-hidden="true"></i>
          <span id="decl-edit-label">Editar declaração</span>
        </button>
        <textarea class="declaracao-textarea" id="declaracao-input" style="display:none"
          oninput="debounceSaveDeclaracao(this.value)"></textarea>
      </div>

      <!-- Cards de valores -->
      <div class="valores-grid" id="valores-grid">
        <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted);font-size:13px">
          Carregando valores...
        </div>
      </div>

      <!-- Verificação semanal -->
      <div class="verificacao-card">
        <div class="verificacao-title">
          <i class="ti ti-calendar-week" aria-hidden="true"></i>
          Como apareceram esta semana?
        </div>
        <div class="verificacao-sub">Registre como cada valor se manifestou nas suas decisões e ações.</div>
        <div id="verificacao-list">
          <div style="font-size:13px;color:var(--text-muted)">Carregando...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal edição de valor -->
<div class="mo" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mo-box">
    <button class="mo-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    <div class="mo-title" id="modal-title">Editar Valor</div>

    <div class="fl">
      <label>Nome</label>
      <input class="fi" id="f-nome" type="text">
    </div>
    <div class="fl">
      <label>Definição</label>
      <textarea class="fta" id="f-definicao"></textarea>
    </div>
    <div class="fl">
      <label>Filtro de decisão</label>
      <textarea class="fta" id="f-filtro" placeholder="A pergunta que você se faz antes de decidir"></textarea>
    </div>
    <div class="fl">
      <label>No dia a dia</label>
      <textarea class="fta" id="f-dia"></textarea>
    </div>
    <div class="fl" style="padding:.6rem;background:var(--surface2);border-radius:8px">
      <label style="display:block;margin-bottom:.3rem">Base científica</label>
      <div id="f-ciencia-display" style="font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.5"></div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:.3rem">
        <i class="ti ti-lock" style="font-size:11px"></i> Campo não editável
      </div>
    </div>

    <div class="mo-actions">
      <button class="btn-s" onclick="closeModal()">Cancelar</button>
      <button class="btn-p" onclick="saveValor()">Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="nav.js"></script>
<script src="lifeos-core.js"></script>
<script>
let valores = [];
let editingId = null;
let saveTimers = {};
let declaracaoAberta = false;

const DECLARACAO_DEFAULT = `Sou um Médico Arquiteto em construção.

Opero na interseção entre a medicina de alto desempenho e a vida intencional. Não busco equilíbrio perfeito — busco clareza sobre o que sacrifico conscientemente e o que protejo a qualquer custo.

Meus quatro valores — Compromisso, Proatividade, Confiança e Consistência — não são aspirações. São filtros de decisão. Quando enfrento uma escolha difícil, a pergunta não é "o que quero?" mas "isso honra quem estou me tornando?"

A residência não é um obstáculo à vida que quero construir. É o laboratório onde essa vida é forjada.`;

const weekKey = () => {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
};

// ── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  initSupabase();
  await loadValores();
  await loadDeclaracao();
  await loadVerificacao();
});

async function loadValores() {
  if (!window.db) { await new Promise(r => setTimeout(r, 1200)); initSupabase(); }
  const { data } = await window.db.from('valores').select('*').order('ordem');
  valores = data || [];
  renderValores();
  renderVerificacao();
}

async function loadDeclaracao() {
  if (!window.db) return;
  const { data } = await window.db.from('caderno_respostas')
    .select('valor').eq('campo', 'identidade-declaracao').maybeSingle();
  const texto = data?.valor || DECLARACAO_DEFAULT;
  document.getElementById('declaracao-text').textContent = texto;
  document.getElementById('declaracao-input').value = texto;
}

async function loadVerificacao() {
  if (!window.db || !valores.length) return;
  const wk = weekKey();
  const ids = valores.map(v => `valores-semana-${wk}-${v.id}`);
  const { data } = await window.db.from('caderno_respostas')
    .select('campo,valor').in('campo', ids);
  const map = {};
  (data||[]).forEach(r => { map[r.campo] = r.valor; });

  document.getElementById('verificacao-list').innerHTML = valores.map(v => {
    const key = `valores-semana-${wk}-${v.id}`;
    const saved = map[key] || '';
    return `<div class="verificacao-item">
      <div class="verificacao-item-header">
        <i class="ti ${v.icone}" style="color:${v.cor}" aria-hidden="true"></i>
        <span class="verificacao-item-nome">${v.nome}</span>
      </div>
      <textarea class="verificacao-textarea" id="verif-${v.id}"
        placeholder="Como ${v.nome.toLowerCase()} apareceu nas suas decisões esta semana?"
        oninput="debounceSaveVerif('${v.id}', this.value)">${saved}</textarea>
    </div>`;
  }).join('');
}

// ── RENDER ─────────────────────────────────────
function renderValores() {
  if (!valores.length) {
    document.getElementById('valores-grid').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted);font-size:13px">
        Nenhum valor cadastrado.</div>`;
    return;
  }
  document.getElementById('valores-grid').innerHTML = valores.map(v => `
    <div class="valor-card" style="border-top-color:${v.cor}">
      <div class="valor-header">
        <div class="valor-icon" style="background:${v.cor}">
          <i class="ti ${v.icone}" aria-hidden="true"></i>
        </div>
        <span class="valor-nome">${v.nome}</span>
      </div>

      <div class="valor-definicao">${v.definicao}</div>

      <div class="valor-filtro">
        <i class="ti ti-help-circle" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>
        ${v.filtro_decisao}
      </div>

      <div class="valor-section-label">No dia a dia</div>
      <div class="valor-dia">${v.no_dia_a_dia}</div>

      <div class="valor-section-label">Base científica</div>
      <div class="valor-ciencia">
        <i class="ti ti-flask" style="font-size:11px;margin-right:4px" aria-hidden="true"></i>
        ${v.ciencia}
      </div>

      <button class="valor-edit-btn" onclick="openModal('${v.id}')">
        <i class="ti ti-pencil" aria-hidden="true"></i> Editar
      </button>
    </div>`).join('');
}

// ── DECLARAÇÃO ─────────────────────────────────
function toggleDeclaracao() {
  declaracaoAberta = !declaracaoAberta;
  document.getElementById('declaracao-text').style.display   = declaracaoAberta ? 'none' : 'block';
  document.getElementById('declaracao-input').style.display  = declaracaoAberta ? 'block' : 'none';
  document.getElementById('decl-edit-icon').className = `ti ${declaracaoAberta ? 'ti-x' : 'ti-pencil'}`;
  document.getElementById('decl-edit-label').textContent = declaracaoAberta ? 'Fechar' : 'Editar declaração';
  if (declaracaoAberta) document.getElementById('declaracao-input').focus();
}

function debounceSaveDeclaracao(value) {
  clearTimeout(saveTimers['declaracao']);
  setStatus('saving');
  saveTimers['declaracao'] = setTimeout(async () => {
    document.getElementById('declaracao-text').textContent = value;
    await window.db.from('caderno_respostas')
      .upsert({ campo:'identidade-declaracao', valor:value }, { onConflict:'campo' });
    setStatus('saved');
  }, 900);
}

// ── MODAL ──────────────────────────────────────
function openModal(id) {
  editingId = id;
  const v = valores.find(x => x.id === id);
  if (!v) return;
  document.getElementById('modal-title').textContent  = `Editar · ${v.nome}`;
  document.getElementById('f-nome').value             = v.nome;
  document.getElementById('f-definicao').value        = v.definicao;
  document.getElementById('f-filtro').value           = v.filtro_decisao;
  document.getElementById('f-dia').value              = v.no_dia_a_dia;
  document.getElementById('f-ciencia-display').textContent = v.ciencia;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingId = null;
}

async function saveValor() {
  if (!editingId || !window.db) return;
  const payload = {
    nome:           document.getElementById('f-nome').value.trim(),
    definicao:      document.getElementById('f-definicao').value.trim(),
    filtro_decisao: document.getElementById('f-filtro').value.trim(),
    no_dia_a_dia:   document.getElementById('f-dia').value.trim(),
    atualizado_em:  new Date().toISOString(),
  };
  setStatus('saving');
  await window.db.from('valores').update(payload).eq('id', editingId);
  setStatus('saved');
  closeModal();
  await loadValores();
}

// ── VERIFICAÇÃO SEMANAL ────────────────────────
function debounceSaveVerif(valorId, value) {
  const key = `valores-semana-${weekKey()}-${valorId}`;
  clearTimeout(saveTimers[key]);
  setStatus('saving');
  saveTimers[key] = setTimeout(async () => {
    await window.db.from('caderno_respostas')
      .upsert({ campo: key, valor: value }, { onConflict: 'campo' });
    setStatus('saved');
  }, 900);
}
</script>
</body>
</html>
