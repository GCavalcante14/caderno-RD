<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Áreas · LifeOS</title>
<script>(function(){
  var t=localStorage.getItem('rd-theme')||'light';
  var a=localStorage.getItem('lp-accent');
  document.documentElement.setAttribute('data-theme',t);
  if(a) document.documentElement.style.setProperty('--acc',a);
})()</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lifeos.css">
<style>
.areas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;}
@media(max-width:680px){.areas-grid{grid-template-columns:1fr;}}

.area-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem 1.2rem 1rem;
  cursor:pointer;transition:border-color .15s,box-shadow .15s;
  position:relative;overflow:hidden;
  border-left:4px solid transparent;
}
.area-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);}

.area-card-top{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;}
.area-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.area-icon i{font-size:17px;color:#fff;}
.area-name{font-size:15px;font-weight:700;color:var(--text);flex:1;line-height:1.2;}
.area-eq{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;}

.area-narrativa{font-size:12px;color:var(--text-muted);font-style:italic;margin-bottom:.8rem;line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.dim-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-muted);width:88px;flex-shrink:0;}
.dim-bar{flex:1;height:5px;border-radius:3px;background:var(--surface2);overflow:hidden;}
.dim-fill{height:100%;border-radius:3px;transition:width .4s;}
.dim-val{font-size:11px;font-weight:700;color:var(--text-muted);width:16px;text-align:right;flex-shrink:0;}

.area-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;
  padding-top:.7rem;border-top:1px solid var(--border);}
.area-atualizado{font-size:11px;color:var(--text-muted);}
.area-entrar{font-size:11px;font-weight:600;color:var(--acc-text);background:var(--acc-soft);
  border:none;padding:3px 10px;border-radius:20px;cursor:pointer;font-family:inherit;}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.mo-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;position:relative;}
.mo-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;
  border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mo-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:1.2rem;}
.fl{margin-bottom:.9rem;}
.fl label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);display:block;margin-bottom:.35rem;}
.fi{width:100%;padding:.45rem .7rem;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;box-sizing:border-box;}
.fi:focus{border-color:var(--acc);}
.fta{width:100%;padding:.45rem .7rem;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;resize:vertical;min-height:64px;box-sizing:border-box;}
.fta:focus{border-color:var(--acc);}
.frow{display:flex;gap:.7rem;}
.frow .fl{flex:1;}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row input[type=range]{flex:1;accent-color:var(--acc);}
.slider-val{font-size:13px;font-weight:700;color:var(--acc-text);min-width:18px;text-align:center;}
.mo-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem;
  padding-top:.9rem;border-top:1px solid var(--border);}
.btn-p{padding:.42rem 1.1rem;border-radius:8px;border:none;background:var(--acc);
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-s{padding:.42rem 1rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:inherit;}
.btn-d{padding:.42rem 1rem;border-radius:8px;border:1px solid #E05555;
  background:transparent;color:#E05555;font-size:13px;cursor:pointer;font-family:inherit;margin-right:auto;}
.icon-btn{display:flex;align-items:center;gap:7px;padding:.4rem .7rem;
  border:1px solid var(--border);border-radius:8px;background:var(--surface2);
  cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);}
.icon-btn i{font-size:17px;}
.add-btn{display:flex;align-items:center;gap:7px;padding:.45rem 1rem;border-radius:8px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .15s;}
.add-btn:hover{border-color:var(--acc);color:var(--acc-text);}
</style>
</head>
<body>

<div id="sb-overlay" class="sb-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <div id="sidebar" class="sidebar"></div>
  <div class="main-area">
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <div class="page-role"><i class="ti ti-map" aria-hidden="true"></i> O Arquiteto — vê o mapa inteiro</div>
          <h1 class="page-title">Áreas</h1>
          <p class="page-subtitle">Os domínios da sua vida · clique para entrar</p>
        </div>
        <button class="add-btn" onclick="openModal()">
          <i class="ti ti-plus" aria-hidden="true"></i> Nova Área
        </button>
      </div>

      <div class="areas-grid" id="areas-grid">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);font-size:13px">
          Carregando áreas...
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="mo" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mo-box">
    <button class="mo-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    <div class="mo-title" id="modal-title">Nova Área</div>

    <div class="frow">
      <div class="fl" style="flex:0 0 auto">
        <label>Ícone</label>
        <button class="icon-btn" onclick="pickIcon()">
          <i class="ti ti-map" id="icon-prev"></i> Escolher
        </button>
      </div>
      <div class="fl">
        <label>Nome</label>
        <input class="fi" id="f-nome" type="text" placeholder="Nome da área">
      </div>
    </div>

    <div class="frow">
      <div class="fl" style="flex:0 0 80px">
        <label>Cor</label>
        <input class="fi" id="f-cor" type="color" value="#8A2540" style="padding:2px 4px;height:36px;cursor:pointer">
      </div>
      <div class="fl">
        <label>Narrativa <span style="font-weight:400;text-transform:none">(sou alguém que...)</span></label>
        <input class="fi" id="f-narrativa" type="text" placeholder="Frase comportamental curta">
      </div>
    </div>

    <div class="fl">
      <label>Paz Mental <span style="font-weight:400;text-transform:none">— como me sinto nessa área agora?</span></label>
      <div class="slider-row">
        <input type="range" min="1" max="10" value="5" id="f-paz"
          oninput="document.getElementById('paz-v').textContent=this.value">
        <span class="slider-val" id="paz-v">5</span>
      </div>
    </div>
    <div class="fl">
      <label>Ação <span style="font-weight:400;text-transform:none">— o quanto atuei esta semana?</span></label>
      <div class="slider-row">
        <input type="range" min="1" max="10" value="5" id="f-acao"
          oninput="document.getElementById('acao-v').textContent=this.value">
        <span class="slider-val" id="acao-v">5</span>
      </div>
    </div>
    <div class="fl">
      <label>Satisfação <span style="font-weight:400;text-transform:none">— estou satisfeito com esse nível?</span></label>
      <div class="slider-row">
        <input type="range" min="1" max="10" value="5" id="f-sat"
          oninput="document.getElementById('sat-v').textContent=this.value">
        <span class="slider-val" id="sat-v">5</span>
      </div>
    </div>
    <div class="fl">
      <label>Preocupação <span style="font-weight:400;text-transform:none">— o quanto estou preocupado?</span></label>
      <div class="slider-row">
        <input type="range" min="1" max="10" value="5" id="f-preo"
          oninput="document.getElementById('preo-v').textContent=this.value">
        <span class="slider-val" id="preo-v">5</span>
      </div>
    </div>

    <div class="fl">
      <label>Visão 2031</label>
      <textarea class="fta" id="f-visao" placeholder="Como essa área estará em 2031?"></textarea>
    </div>

    <div class="mo-actions">
      <button class="btn-d" id="btn-del" style="display:none" onclick="deleteArea()">
        <i class="ti ti-trash"></i> Excluir
      </button>
      <button class="btn-s" onclick="closeModal()">Cancelar</button>
      <button class="btn-p" onclick="saveArea()">Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="nav.js"></script>
<script src="lifeos-core.js"></script>
<script src="icon-picker.js"></script>
<script>
let areas = [];
let editingId = null;
let currentIcon = 'ti-map';

// ── EQUILÍBRIO ─────────────────────────────────
function calcEq(a) {
  const pos = (a.paz_mental + a.satisfacao + a.acao) / 3;
  const neg = a.preocupacao * 0.4;
  return Math.max(0, Math.min(10, (pos - neg + 10) / 2)).toFixed(1);
}

function eqColor(eq) {
  const v = parseFloat(eq);
  return v >= 7 ? '#1D9E75' : v >= 5 ? '#C8A030' : '#8A2540';
}

function diasDesde(dateStr) {
  if (!dateStr) return 'nunca atualizado';
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (diff === 0) return 'atualizado hoje';
  if (diff === 1) return 'há 1 dia';
  return `há ${diff} dias`;
}

// ── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  initSupabase();
  await loadAreas();
});

async function loadAreas() {
  if (!window.db) { await new Promise(r => setTimeout(r, 1200)); initSupabase(); }
  if (!window.db) return;
  const { data, error } = await window.db.from('areas').select('*').eq('ativo', true).order('ordem');
  if (error) { console.error(error); return; }
  areas = data || [];
  renderGrid();
}

// ── RENDER ─────────────────────────────────────
const DIMS = [
  { key:'paz_mental',  label:'Paz Mental',  color:'#185FA5' },
  { key:'acao',        label:'Ação',         color:'#1D9E75' },
  { key:'satisfacao',  label:'Satisfação',   color:'#6B35A0' },
  { key:'preocupacao', label:'Preocupação',  color:'#E05555' },
];

function renderGrid() {
  const grid = document.getElementById('areas-grid');
  if (!areas.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);font-size:13px">
      Nenhuma área. <button onclick="openModal()" style="background:none;border:none;color:var(--acc-text);cursor:pointer;font-family:inherit;font-size:13px">Criar primeira área →</button></div>`;
    return;
  }
  grid.innerHTML = areas.map(a => {
    const eq = calcEq(a);
    const eqC = eqColor(eq);
    const dims = DIMS.map(d => `
      <div class="dim-row">
        <span class="dim-label">${d.label}</span>
        <div class="dim-bar"><div class="dim-fill" style="width:${(a[d.key]||5)*10}%;background:${d.color}"></div></div>
        <span class="dim-val">${a[d.key]||5}</span>
      </div>`).join('');

    return `<div class="area-card" style="border-left-color:${a.cor}" onclick="goDetalhe('${a.id}')">
      <div class="area-card-top">
        <div class="area-icon" style="background:${a.cor}">
          <i class="ti ${a.icone}" aria-hidden="true"></i>
        </div>
        <span class="area-name">${a.nome}</span>
        <span class="area-eq" style="background:${eqC}22;color:${eqC}">${eq}</span>
      </div>
      ${a.narrativa ? `<div class="area-narrativa">"${a.narrativa}"</div>` : ''}
      <div>${dims}</div>
      <div class="area-footer">
        <span class="area-atualizado"><i class="ti ti-clock" style="font-size:11px" aria-hidden="true"></i> ${diasDesde(a.ultima_atualizacao)}</span>
        <button class="area-entrar" onclick="event.stopPropagation();goDetalhe('${a.id}')">
          Entrar <i class="ti ti-arrow-right" style="font-size:11px" aria-hidden="true"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

function goDetalhe(id) {
  window.location.href = `area-detalhe.html?id=${id}`;
}

// ── MODAL ──────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  const a = id ? areas.find(x => x.id === id) : null;

  document.getElementById('modal-title').textContent = a ? 'Editar Área' : 'Nova Área';
  document.getElementById('btn-del').style.display = (a && !a.padrao) ? 'inline-flex' : 'none';

  currentIcon = a?.icone || 'ti-map';
  document.getElementById('icon-prev').className = `ti ${currentIcon}`;
  document.getElementById('f-nome').value      = a?.nome       || '';
  document.getElementById('f-cor').value       = a?.cor        || '#8A2540';
  document.getElementById('f-narrativa').value = a?.narrativa  || '';
  document.getElementById('f-visao').value     = a?.visao_2031 || '';

  const setSlider = (id, valId, val) => {
    document.getElementById(id).value = val;
    document.getElementById(valId).textContent = val;
  };
  setSlider('f-paz',  'paz-v',  a?.paz_mental  || 5);
  setSlider('f-acao', 'acao-v', a?.acao         || 5);
  setSlider('f-sat',  'sat-v',  a?.satisfacao   || 5);
  setSlider('f-preo', 'preo-v', a?.preocupacao  || 5);

  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingId = null;
}

function pickIcon() {
  if (typeof openIconPicker === 'function') {
    openIconPicker(icon => {
      currentIcon = icon;
      document.getElementById('icon-prev').className = `ti ${icon}`;
    }, currentIcon);
  }
}

async function saveArea() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Nome é obrigatório'); return; }

  const payload = {
    nome,
    icone:             currentIcon,
    cor:               document.getElementById('f-cor').value,
    narrativa:         document.getElementById('f-narrativa').value.trim(),
    visao_2031:        document.getElementById('f-visao').value.trim(),
    paz_mental:        parseInt(document.getElementById('f-paz').value),
    acao:              parseInt(document.getElementById('f-acao').value),
    satisfacao:        parseInt(document.getElementById('f-sat').value),
    preocupacao:       parseInt(document.getElementById('f-preo').value),
    ultima_atualizacao: todayISO(),
    atualizado_em:     new Date().toISOString(),
  };

  if (!window.db) return;
  if (editingId) {
    await window.db.from('areas').update(payload).eq('id', editingId);
  } else {
    const maxOrdem = areas.length ? Math.max(...areas.map(a => a.ordem || 0)) : 0;
    await window.db.from('areas').insert({ ...payload, ordem: maxOrdem + 1 });
  }

  closeModal();
  await loadAreas();
}

async function deleteArea() {
  if (!editingId || !confirm('Excluir esta área?')) return;
  await window.db.from('areas').update({ ativo: false }).eq('id', editingId);
  closeModal();
  await loadAreas();
}
</script>
</body>
</html>
