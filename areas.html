<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Áreas · LifeOS</title>
<script>(function(){
  var t=localStorage.getItem('rd-theme')||'light';
  var a=localStorage.getItem('lp-accent');
  document.documentElement.setAttribute('data-theme',t);
  if(a) document.documentElement.style.setProperty('--acc',a);
})()</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="lifeos.css">
<style>
.areas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;}
@media(max-width:700px){.areas-grid{grid-template-columns:1fr;}}

.area-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
.area-card:hover{border-color:var(--acc);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.area-card-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:var(--radius) 0 0 var(--radius);}
.area-card-header{display:flex;align-items:center;gap:10px;margin-bottom:.7rem;}
.area-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.area-icon i{font-size:18px;color:#fff;}
.area-name{font-size:15px;font-weight:700;color:var(--text);flex:1;}
.area-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.area-visao{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.7rem;}
.area-footer{display:flex;align-items:center;justify-content:space-between;}
.area-score{display:flex;align-items:center;gap:6px;}
.area-score-bar{width:80px;height:5px;border-radius:3px;background:var(--surface2);overflow:hidden;}
.area-score-fill{height:100%;border-radius:3px;transition:width .3s;}
.area-score-num{font-size:11px;font-weight:700;color:var(--text-muted);}
.area-edit-btn{font-size:11px;color:var(--acc-text);background:var(--acc-soft);border:none;padding:3px 10px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;}

/* Roda da Vida */
.roda-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.2rem;}
.roda-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.roda-svg-wrap{max-width:420px;margin:0 auto;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:1.2rem;}
.form-field{margin-bottom:1rem;}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.4rem;display:block;}
.form-input{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;}
.form-input:focus{border-color:var(--acc);}
.form-select{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer;}
.form-textarea{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:72px;box-sizing:border-box;}
.form-textarea:focus{border-color:var(--acc);}
.form-row{display:flex;gap:.8rem;}
.form-row .form-field{flex:1;}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);}
.btn-primary{padding:.45rem 1.1rem;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-secondary{padding:.45rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:inherit;}
.btn-danger{padding:.45rem 1rem;border-radius:8px;border:1px solid #E05555;background:transparent;color:#E05555;font-size:13px;cursor:pointer;font-family:inherit;margin-right:auto;}

.icon-preview-btn{display:flex;align-items:center;gap:8px;padding:.45rem .8rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);}
.icon-preview-btn i{font-size:18px;}

.score-row{display:flex;align-items:center;gap:10px;}
.score-slider{flex:1;accent-color:var(--acc);}
.score-val{font-size:14px;font-weight:700;color:var(--acc-text);min-width:20px;text-align:center;}

.add-btn{display:flex;align-items:center;gap:8px;padding:.5rem 1.1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .15s;}
.add-btn:hover{border-color:var(--acc);color:var(--acc-text);}
</style>
</head>
<body>

<div id="sb-overlay" class="sb-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <div id="sidebar" class="sidebar"></div>

  <div class="main-area">
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <div class="page-role"><i class="ti ti-map" aria-hidden="true"></i> O Arquiteto — vê o mapa inteiro</div>
          <h1 class="page-title">Áreas</h1>
          <p class="page-subtitle">Os 6 domínios da sua vida</p>
        </div>
        <button class="add-btn" onclick="openModal()">
          <i class="ti ti-plus" aria-hidden="true"></i> Nova Área
        </button>
      </div>

      <!-- Roda da Vida -->
      <div class="roda-container">
        <div class="roda-title">
          <i class="ti ti-chart-radar" aria-hidden="true"></i>
          Roda da Vida
          <span style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:4px">— clique num eixo para editar</span>
        </div>
        <div class="roda-svg-wrap" id="roda-wrap">
          <div style="text-align:center;color:var(--text-muted);font-size:13px;padding:2rem">Carregando...</div>
        </div>
      </div>

      <!-- Grid de áreas -->
      <div class="areas-grid" id="areas-grid">
        <div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted);font-size:13px">
          Carregando áreas...
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal de criação/edição -->
<div class="modal-overlay" id="modal" style="display:none" onclick="onOverlayClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    <div class="modal-title" id="modal-title">Nova Área</div>

    <div class="form-row">
      <div class="form-field" style="flex:0 0 auto">
        <label class="form-label">Ícone</label>
        <button class="icon-preview-btn" id="icon-btn" onclick="pickIcon()">
          <i class="ti ti-map" id="icon-preview"></i>
          <span>Escolher</span>
        </button>
      </div>
      <div class="form-field">
        <label class="form-label">Nome</label>
        <input class="form-input" id="f-nome" type="text" placeholder="Ex: Saúde & Vitalidade">
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Cor</label>
        <input class="form-input" id="f-cor" type="color" value="#8A2540" style="padding:2px 4px;height:36px;cursor:pointer;">
      </div>
      <div class="form-field">
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          <option value="expansao">📈 Expansão</option>
          <option value="manutencao" selected>🛡️ Manutenção</option>
          <option value="latente">💤 Latente</option>
          <option value="crise">🚨 Crise</option>
        </select>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">Score na Roda (1–10)</label>
      <div class="score-row">
        <input class="score-slider" id="f-score" type="range" min="1" max="10" value="5"
          oninput="document.getElementById('score-display').textContent=this.value">
        <span class="score-val" id="score-display">5</span>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">Visão 2031</label>
      <textarea class="form-textarea" id="f-visao" placeholder="Como essa área estará em 2031?"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-danger" id="btn-delete" style="display:none" onclick="deleteArea()">
        <i class="ti ti-trash"></i> Excluir
      </button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveArea()">Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="nav.js"></script>
<script src="lifeos-core.js"></script>
<script src="icon-picker.js"></script>
<script>
let areas = [];
let editingId = null;
let currentIcon = 'ti-map';

const STATUS = {
  crise:      { label:'🚨 Crise',       bg:'rgba(220,50,50,0.12)',   color:'#E05555' },
  expansao:   { label:'📈 Expansão',    bg:'rgba(29,158,117,0.12)',  color:'#1D9E75' },
  manutencao: { label:'🛡️ Manutenção', bg:'rgba(24,95,165,0.12)',   color:'#185FA5' },
  latente:    { label:'💤 Latente',     bg:'rgba(150,150,150,0.12)', color:'#999'    },
};

// ── INIT ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  initSupabase();
  await loadAreas();
});

async function loadAreas() {
  if (!window.db) { await new Promise(r=>setTimeout(r,1200)); initSupabase(); }
  if (!window.db) return;
  const { data } = await window.db.from('areas').select('*').eq('ativo',true).order('ordem');
  areas = data || [];
  renderGrid();
  renderRoda();
}

// ── RENDER GRID ────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('areas-grid');
  if (!areas.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted);font-size:13px">
      Nenhuma área cadastrada.</div>`;
    return;
  }
  grid.innerHTML = areas.map(a => {
    const st = STATUS[a.status] || STATUS.manutencao;
    const scorePct = ((a.score||5)/10)*100;
    return `<div class="area-card" onclick="openModal('${a.id}')">
      <div class="area-card-accent" style="background:${a.cor}"></div>
      <div class="area-card-header">
        <div class="area-icon" style="background:${a.cor}">
          <i class="ti ${a.icone}" aria-hidden="true"></i>
        </div>
        <span class="area-name">${a.nome}</span>
        <span class="area-badge" style="background:${st.bg};color:${st.color}">${st.label}</span>
      </div>
      <div class="area-visao">${a.visao_2031 || '<em style="color:var(--text-muted)">Sem visão definida</em>'}</div>
      <div class="area-footer">
        <div class="area-score">
          <div class="area-score-bar">
            <div class="area-score-fill" style="width:${scorePct}%;background:${a.cor}"></div>
          </div>
          <span class="area-score-num">${a.score||5}/10</span>
        </div>
        <button class="area-edit-btn" onclick="event.stopPropagation();openModal('${a.id}')">
          Editar →
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── RODA DA VIDA (SVG puro) ────────────────────
function renderRoda() {
  const wrap = document.getElementById('roda-wrap');
  if (!areas.length) { wrap.innerHTML = ''; return; }

  const cx=210, cy=210, r=150, n=areas.length||6;
  const pad = 60; // padding para labels
  const W = (cx+r+pad)*2, H = (cy+r+pad)*2;

  function pt(i, scale) {
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    return { x: cx + r*scale*Math.cos(angle), y: cy + r*scale*Math.sin(angle) };
  }

  // Rings
  let rings = '';
  for (let lv=1; lv<=5; lv++) {
    const pts = areas.map((_,i) => { const p=pt(i,lv/5); return `${p.x},${p.y}`; }).join(' ');
    rings += `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1" opacity=".6"/>`;
  }

  // Axes
  let axes = '';
  areas.forEach((_,i) => {
    const p = pt(i,1);
    axes += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="var(--border)" stroke-width="1" opacity=".6"/>`;
  });

  // Data polygon
  const dataPts = areas.map((a,i) => { const p=pt(i,(a.score||5)/10); return `${p.x},${p.y}`; }).join(' ');
  const dataEl = `<polygon points="${dataPts}" fill="var(--acc)" fill-opacity=".2" stroke="var(--acc)" stroke-width="2.5" stroke-linejoin="round"/>`;

  // Dots on data points
  let dots = '';
  areas.forEach((a,i) => {
    const p = pt(i,(a.score||5)/10);
    dots += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--acc)" stroke="var(--surface)" stroke-width="2"/>`;
  });

  // Labels (icon + name)
  let labels = '';
  areas.forEach((a,i) => {
    const lp = pt(i, 1.32);
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    const anchor = Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : Math.cos(angle) > 0 ? 'start' : 'end';
    const shortName = a.nome.split(' ')[0];
    labels += `
      <g onclick="openModal('${a.id}')" style="cursor:pointer">
        <text x="${lp.x}" y="${lp.y - 7}" text-anchor="${anchor}" font-size="11.5"
          font-weight="600" fill="var(--text2)" font-family="inherit">${shortName}</text>
        <text x="${lp.x}" y="${lp.y + 9}" text-anchor="${anchor}" font-size="10"
          fill="var(--text-muted)" font-family="inherit">${a.score||5}/10</text>
      </g>`;
  });

  // Center score
  const avgScore = areas.length ? (areas.reduce((s,a)=>s+(a.score||5),0)/areas.length).toFixed(1) : '—';
  const center = `
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="20" font-weight="700"
      fill="var(--acc-text)" font-family="inherit">${avgScore}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10"
      fill="var(--text-muted)" font-family="inherit">média</text>`;

  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:420px;display:block;margin:0 auto">
      <g transform="translate(${pad},${pad})">
        ${rings}${axes}${dataEl}${dots}${labels}${center}
      </g>
    </svg>`;
}

// ── MODAL ──────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  const area = id ? areas.find(a=>a.id===id) : null;
  const isEdit = !!area;

  document.getElementById('modal-title').textContent = isEdit ? 'Editar Área' : 'Nova Área';
  document.getElementById('btn-delete').style.display = isEdit && !area.padrao ? 'inline-flex' : 'none';

  currentIcon = area?.icone || 'ti-map';
  document.getElementById('icon-preview').className = `ti ${currentIcon}`;
  document.getElementById('f-nome').value   = area?.nome       || '';
  document.getElementById('f-cor').value    = area?.cor        || '#8A2540';
  document.getElementById('f-status').value = area?.status     || 'manutencao';
  document.getElementById('f-visao').value  = area?.visao_2031 || '';
  const score = area?.score || 5;
  document.getElementById('f-score').value  = score;
  document.getElementById('score-display').textContent = score;

  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingId = null;
}

function onOverlayClick(e) {
  if (e.target.id === 'modal') closeModal();
}

function pickIcon() {
  if (typeof openIconPicker === 'function') {
    openIconPicker(icon => {
      currentIcon = icon;
      document.getElementById('icon-preview').className = `ti ${icon}`;
    }, currentIcon);
  }
}

async function saveArea() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Nome é obrigatório'); return; }

  const payload = {
    nome,
    icone:      currentIcon,
    cor:        document.getElementById('f-cor').value,
    status:     document.getElementById('f-status').value,
    visao_2031: document.getElementById('f-visao').value.trim(),
    score:      parseInt(document.getElementById('f-score').value),
    atualizado_em: new Date().toISOString(),
  };

  if (!window.db) return;
  if (editingId) {
    await window.db.from('areas').update(payload).eq('id', editingId);
  } else {
    const maxOrdem = areas.length ? Math.max(...areas.map(a=>a.ordem||0)) : 0;
    await window.db.from('areas').insert({ ...payload, ordem: maxOrdem+1 });
  }

  closeModal();
  await loadAreas();
}

async function deleteArea() {
  if (!editingId) return;
  if (!confirm('Excluir esta área?')) return;
  await window.db.from('areas').update({ ativo: false }).eq('id', editingId);
  closeModal();
  await loadAreas();
}
</script>
</body>
</html>
